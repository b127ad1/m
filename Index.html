<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nothing</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: "Courier New", monospace;
      overflow: hidden;
      color: #00ff9f;
    }

    /* Terminal container */
    .terminal {
      padding: 40px;
      font-size: 1.8rem;
      line-height: 1.6;
      text-shadow:
        0 0 5px #00ff9f,
        0 0 10px #00ff9f,
        0 0 20px #00ff9f;
      animation: flicker 3s infinite;
    }

    /* Scanlines */
    body::after {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05) 0px,
        rgba(0,255,0,0.05) 1px,
        transparent 2px,
        transparent 4px
      );
    }

    .line {
      display: flex;
      align-items: center;
    }

    .prompt {
      margin-right: 10px;
    }

    .text {
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      border-right: 2px solid #00ff9f;
      width: 0;
      animation: typing 2.5s steps(7) forwards, blink 0.8s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 7ch }
    }

    @keyframes blink {
      50% { border-color: transparent }
    }

    @keyframes flicker {
      0% { opacity: 1; }
      5% { opacity: 0.5; }
      10% { opacity: 1; }
      15% { opacity: 0.7; }
      20% { opacity: 1; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="terminal">
    <div class="line">
      <span class="prompt">root@system:~$</span>
      <span class="text" id="text">nothing</span>
    </div>
  </div>

  <script>
    // Loop typing like a real terminal
    setInterval(() => {
      const el = document.getElementById("text");
      el.style.animation = "none";
      void el.offsetWidth;
      el.style.animation = "typing 2.5s steps(7) forwards, blink 0.8s infinite";
    }, 5000);
  </script>

</body>
</html>
